name: HF Space KeepAlive
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SPACE_URL: "https://huggingface.co/spaces/xiajingfeng/shufa"
    steps:
      - name: 安装依赖与浏览器
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0 libwayland-client0
          npm init -y
          npm install playwright
          npx playwright install chrome
      - name: 浏览器访问保活
        run: |
          cat > keep.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36'
            });
            await page.goto(process.env.SPACE_URL, { timeout: 60000 });
            // 页面停留20秒模拟真人浏览
            await page.waitForTimeout(20000);
            console.log("页面访问完成，保活成功");
            await browser.close();
          })();
          EOF
          node keep.js
